name: Claim Epic Free Games

on:
  schedule:
    - cron: '0 9 * * 4'   # Every Thursday 9AM UTC (Epic refreshes Thursdays)
    - cron: '0 17 * * 4'  # Thursday 5PM UTC safety net
    - cron: '0 9 * * 1'   # Monday safety re-run
  workflow_dispatch:      # Manual trigger

jobs:
  claim:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit claimed.json state

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run claimer
        env:
          EPIC_COOKIES: ${{ secrets.EPIC_COOKIES }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python -m claimer

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add claimed.json || true
          git diff --cached --quiet || git commit -m "chore: update claimed games state"
          git push || true
